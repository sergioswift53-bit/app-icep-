<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depuración Cámara - El Nayar</title>
    <script src="https://unpkg.com"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-800 text-white p-6 flex flex-col items-center">

    <h1 class="text-lg font-bold mb-4">ESTADO DEL SISTEMA</h1>
    
    <div id="info" class="text-xs bg-black p-4 rounded-lg w-full mb-4 font-mono text-green-400">
        Esperando interacción...
    </div>

    <button onclick="probarCamara()" class="w-full bg-blue-600 p-6 rounded-2xl font-bold text-xl mb-4">
        SOLICITAR ACCESO YA
    </button>

    <div id="reader" class="w-full max-w-sm rounded-xl overflow-hidden"></div>

    <script>
        function log(msg) {
            document.getElementById('info').innerHTML += "<br>> " + msg;
        }

        async function probarCamara() {
            log("Iniciando secuencia...");
            
            // Verificamos si estamos en HTTPS
            if (location.protocol !== 'https:') {
                log("ERROR: No estás en HTTPS. La cámara se bloqueará.");
                alert("Debes usar HTTPS para que la cámara funcione.");
                return;
            }

            try {
                log("Pidendo permiso al sistema...");
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                log("¡Permiso de hardware concedido!");
                stream.getTracks().forEach(track => track.stop()); // Cerramos el test

                const html5QrCode = new Html5Qrcode("reader");
                await html5QrCode.start(
                    { facingMode: "environment" }, 
                    { fps: 10, qrbox: 250 },
                    (txt) => alert("QR Leído: " + txt)
                );
                log("Cámara encendida con éxito.");
            } catch (err) {
                log("FALLO: " + err.name + " - " + err.message);
                alert("Error: " + err.message);
            }
        }
    </script>
</body>
</html>
