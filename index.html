<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primaria El Nayar</title>
    <!-- Librerías con carga prioritaria -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com"></script>
    <style>
        body { font-family: sans-serif; background-color: #f1f5f9; }
        .modal-fondo { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; padding: 20px; overflow-y: auto; }
        #reader { width: 100%; border-radius: 15px; background: #000; }
        .watermark { position: fixed; bottom: 10px; width: 100%; text-align: center; color: #1e3a8a44; font-size: 10px; font-weight: bold; pointer-events: none; z-index: 10; }
    </style>
</head>
<body class="pb-20">

    <div class="max-w-md mx-auto p-4">
        <h1 class="text-2xl font-black text-blue-700 text-center uppercase mb-6 mt-4">Escuela Primaria<br>El Nayar Durango</h1>

        <!-- BUSCADOR MANUAL -->
        <div class="mb-4">
            <input type="text" id="bus-input" oninput="motorBusqueda()" placeholder="🔍 Buscar nombre o ALUM-..." 
                class="w-full p-4 rounded-2xl border-2 border-white shadow-md focus:border-blue-500 outline-none">
            <div id="bus-resultados" class="hidden bg-white mt-1 rounded-xl shadow-2xl border overflow-hidden border-blue-100"></div>
        </div>

        <!-- BOTONES PRINCIPALES -->
        <div class="space-y-3">
            <button onclick="abrirCamara()" class="w-full bg-blue-600 text-white py-5 rounded-2xl shadow-xl font-black text-lg active:bg-blue-800">
                📷 ABRIR LECTOR QR
            </button>
            
            <button onclick="abrirFormulario()" class="w-full bg-white text-blue-700 border-2 border-blue-600 py-5 rounded-2xl shadow-sm font-black text-lg active:bg-blue-50">
                ➕ AGREGAR ALUMNO
            </button>

            <button onclick="document.getElementById('mod-config').style.display='block'" class="w-full bg-slate-200 text-slate-600 py-3 rounded-2xl font-bold text-sm">
                ⚙️ CONFIGURACIONES
            </button>
        </div>

        <!-- LECTOR QR -->
        <div id="zona-lector" class="hidden mt-4 p-2 bg-white rounded-3xl shadow-lg border-2 border-blue-200">
            <div id="reader"></div>
            <button onclick="cerrarCamara()" class="w-full bg-red-500 text-white py-3 rounded-xl mt-2 font-bold">CERRAR CÁMARA</button>
        </div>

        <!-- FICHA DE RESULTADO -->
        <div id="ficha" class="hidden mt-6 bg-white rounded-3xl shadow-2xl overflow-hidden border-t-8 border-blue-600">
            <div class="h-48 bg-slate-200 flex items-center justify-center overflow-hidden">
                <img id="f-foto" class="w-full h-full object-cover hidden">
                <span id="f-icon" class="text-6xl">👤</span>
            </div>
            <div class="p-6">
                <h2 id="f-nombre" class="text-2xl font-black text-slate-800 uppercase"></h2>
                <p id="f-id" class="text-blue-600 font-mono font-bold mb-4"></p>
                <div class="space-y-2 border-t pt-4 text-sm">
                    <p><strong>Tutor:</strong> <span id="f-tutor"></span></p>
                    <div class="p-3 bg-red-50 text-red-700 rounded-xl font-bold">Alergias: <span id="f-alergias"></span></div>
                </div>
                <button onclick="location.reload()" class="w-full bg-slate-800 text-white py-4 rounded-2xl mt-6 font-bold">CERRAR</button>
            </div>
        </div>
    </div>

    <!-- MODAL REGISTRO (FORMULARIO) -->
    <div id="mod-registro" class="modal-fondo">
        <div class="bg-white rounded-3xl p-6 max-w-sm mx-auto shadow-2xl mt-4">
            <h3 class="text-xl font-black text-blue-700 mb-4 text-center border-b pb-2">NUEVO REGISTRO</h3>
            <form id="form-alta" class="space-y-4">
                <div class="bg-blue-50 p-4 rounded-2xl border-2 border-dashed border-blue-200 text-center">
                    <label class="cursor-pointer block">
                        <span class="text-xs font-bold text-blue-600">📷 SUBIR FOTO (GALERÍA)</span>
                        <input type="file" id="r-foto" accept="image/*" class="hidden">
                    </label>
                </div>
                <input type="text" id="r-id" readonly class="w-full p-3 bg-slate-100 rounded-xl font-mono font-bold text-blue-600">
                <input type="text" id="r-nombre" placeholder="Nombre completo" class="w-full p-4 border rounded-xl" required>
                <input type="text" id="r-tutor" placeholder="Nombre del tutor" class="w-full p-4 border rounded-xl" required>
                <textarea id="r-alergias" placeholder="Alergias..." class="w-full p-4 border rounded-xl"></textarea>
                
                <div class="flex gap-2">
                    <button type="button" onclick="document.getElementById('mod-registro').style.display='none'" class="flex-1 font-bold text-slate-400">CANCELAR</button>
                    <button type="submit" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-black">GUARDAR</button>
                </div>
            </form>
        </div>
    </div>

    <!-- MODAL CONFIG -->
    <div id="mod-config" class="modal-fondo">
        <div class="bg-white rounded-3xl p-6 max-w-sm mx-auto shadow-2xl mt-20 text-center">
            <button onclick="localStorage.clear(); location.reload();" class="w-full bg-red-100 text-red-600 p-4 rounded-xl font-bold mb-4 uppercase">🗑️ Borrar toda la base</button>
            <button onclick="document.getElementById('mod-config').style.display='none'" class="w-full bg-slate-900 text-white p-4 rounded-xl font-bold uppercase">Volver</button>
        </div>
    </div>

    <div class="watermark uppercase">Gestión Escolares Grupo A9</div>

    <script>
        // CARGA DE DATOS
        let datosAlumnos = JSON.parse(localStorage.getItem('nayar_storage')) || {};
        let escannerQR = null;

        // FUNCIONES DE INTERFAZ
        function abrirFormulario() {
            const total = Object.keys(datosAlumnos).length + 1;
            document.getElementById('r-id').value = "ALUM-" + total.toString().padStart(3, '0');
            document.getElementById('mod-registro').style.display = 'block';
        }

        // MOTOR DE BÚSQUEDA
        function motorBusqueda() {
            const val = document.getElementById('bus-input').value.toUpperCase();
            const resCont = document.getElementById('bus-resultados');
            resCont.innerHTML = '';
            if(val.length < 2) { resCont.classList.add('hidden'); return; }

            const coincidencias = Object.keys(datosAlumnos).filter(k => k.includes(val) || datosAlumnos[k].nombre.toUpperCase().includes(val));
            
            if(coincidencias.length > 0) {
                resCont.classList.remove('hidden');
                coincidencias.forEach(id => {
                    const item = document.createElement('div');
                    item.className = "p-4 border-b hover:bg-blue-50 active:bg-blue-100 cursor-pointer flex justify-between";
                    item.innerHTML = <span>${datosAlumnos[id].nombre}</span><b class="text-blue-600">${id}</b>;
                    item.onclick = () => { verFicha(id); resCont.classList.add('hidden'); document.getElementById('bus-input').value = ''; };
                    resCont.appendChild(item);
                });
            } else { resCont.classList.add('hidden'); }
        }

        // GUARDAR DATOS
        document.getElementById('form-alta').onsubmit = function(e) {
            e.preventDefault();
            const id = document.getElementById('r-id').value;
            const file = document.getElementById('r-foto').files[0];

            const procesoGuardar = (imgBase64) => {
                datosAlumnos[id] = {
                    nombre: document.getElementById('r-nombre').value,
                    tutor: document.getElementById('r-tutor').value,
                    alergias: document.getElementById('r-alergias').value || "Ninguna",
                    foto: imgBase64
                };
                localStorage.setItem('nayar_storage', JSON.stringify(datosAlumnos));
                location.reload();
            };

            if(file) {
                const reader = new FileReader();
                reader.onload = (ev) => procesoGuardar(ev.target.result);
                reader.readAsDataURL(file);
            } else { procesoGuardar(null); }
        };

        // CÁMARA
        async function abrirCamara() {
            document.getElementById('zona-lector').classList.remove('hidden');
            if(!escannerQR) escannerQR = new Html5Qrcode("reader");
            
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            
            escannerQR.start({ facingMode: "environment" }, config, (decoded) => {
                verFicha(decoded);
            }).catch(err => alert("Error: Verifica permisos de cámara y asegúrate de usar HTTPS."));
        }

        function cerrarCamara() {
            if(escannerQR) escannerQR.stop().catch(()=>{});
            document.getElementById('zona-lector').classList.add('hidden');
        }

        // MOSTRAR FICHA
        function verFicha(id) {
            const data = datosAlumnos[id.toUpperCase().trim()];
            if(!data) return alert("Alumno " + id + " no encontrado.");
            
            cerrarCamara();
            document.getElementById('ficha').classList.remove('hidden');
            document.getElementById('f-nombre').innerText = data.nombre;
            document.getElementById('f-id').innerText = id;
            document.getElementById('f-tutor').innerText = data.tutor;
            document.getElementById('f-alergias').innerText = data.alergias;

            const foto = document.getElementById('f-foto');
            const icon = document.getElementById('f-icon');
            if(data.foto) {
                foto.src = data.foto;
                foto.classList.remove('hidden');
                icon.classList.add('hidden');
            } else {
                foto.classList.add('hidden');
                icon.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
