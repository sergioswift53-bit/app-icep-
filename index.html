<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escuela Primaria El Nayar Durango</title>
    <!-- Cargamos versiones estables específicas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com"></script>
    <style>
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; padding: 20px; overflow-y: auto; }
        #reader { width: 100%; border-radius: 10px; background: #000; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 flex flex-col items-center">

    <h1 class="text-xl font-bold text-blue-700 text-center mb-6">ESCUELA PRIMARIA EL NAYAR DURANGO</h1>

    <div class="w-full max-w-sm space-y-4">
        <!-- BOTONES QUE SÍ FUNCIONAN -->
        <button onclick="document.getElementById('m-camara').style.display='block'; iniciarScanner()" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold">📷 ESCANEAR QR</button>
        <button onclick="abrirForm()" class="w-full bg-white text-blue-600 border-2 border-blue-600 p-4 rounded-xl font-bold">➕ AGREGAR ALUMNO</button>
        <button onclick="exportar()" class="w-full bg-gray-200 text-gray-600 p-2 rounded-xl text-xs font-bold uppercase tracking-widest">⚙️ RESPALDO DATOS</button>
    </div>

    <!-- MODAL CÁMARA -->
    <div id="m-camara" class="modal">
        <div class="bg-white p-4 rounded-2xl max-w-sm mx-auto mt-10">
            <div id="reader"></div>
            <button onclick="location.reload()" class="w-full bg-red-500 text-white p-3 mt-4 rounded-lg font-bold">CERRAR CÁMARA</button>
        </div>
    </div>

    <!-- MODAL REGISTRO -->
    <div id="m-reg" class="modal">
        <div class="bg-white p-6 rounded-2xl max-w-sm mx-auto mt-10 shadow-2xl">
            <h2 class="text-blue-700 font-bold mb-4 uppercase">Nuevo Alumno</h2>
            <form id="form" class="space-y-3">
                <input type="text" id="r-id" readonly class="w-full bg-gray-100 p-3 rounded-lg text-blue-600 font-mono">
                <input type="text" id="r-nom" placeholder="Nombre completo" class="w-full border p-3 rounded-lg" required>
                <input type="text" id="r-tut" placeholder="Tutor" class="w-full border p-3 rounded-lg" required>
                <textarea id="r-ale" placeholder="Alergias" class="w-full border p-3 rounded-lg"></textarea>
                <div class="flex gap-2">
                    <button type="button" onclick="document.getElementById('m-reg').style.display='none'" class="flex-1 text-gray-400">Cancelar</button>
                    <button type="submit" class="flex-1 bg-blue-600 text-white p-3 rounded-lg font-bold">GUARDAR</button>
                </div>
            </form>
        </div>
    </div>

    <!-- FICHA RESULTADO -->
    <div id="ficha" class="hidden fixed inset-0 bg-white z-[2000] p-6 text-center">
        <h2 id="f-nom" class="text-2xl font-bold text-gray-800"></h2>
        <p id="f-id" class="text-blue-600 font-bold mb-4"></p>
        <p class="border-t pt-4"><b>Tutor:</b> <span id="f-tut"></span></p>
        <p class="bg-red-50 text-red-600 p-4 mt-2 rounded-xl"><b>Alergias:</b> <span id="f-ale"></span></p>
        <button onclick="location.reload()" class="bg-gray-800 text-white p-4 w-full mt-6 rounded-xl">ESCANEAR SIGUIENTE</button>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('nayar_db')) || {};
        let scanner = null;

        function abrirForm() {
            const idNum = Object.keys(db).length + 1;
            document.getElementById('r-id').value = "ALUM-" + idNum.toString().padStart(3, '0');
            document.getElementById('m-reg').style.display = 'block';
        }

        document.getElementById('form').onsubmit = (e) => {
            e.preventDefault();
            const id = document.getElementById('r-id').value;
            db[id] = {
                nom: document.getElementById('r-nom').value,
                tut: document.getElementById('r-tut').value,
                ale: document.getElementById('r-ale').value || "Ninguna"
            };
            localStorage.setItem('nayar_db', JSON.stringify(db));
            alert("Guardado!");
            location.reload();
        };

        function iniciarScanner() {
            scanner = new Html5Qrcode("reader");
            scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
                const alum = db[txt.toUpperCase().trim()];
                if(alum) {
                    scanner.stop();
                    document.getElementById('m-camara').style.display='none';
                    document.getElementById('ficha').classList.remove('hidden');
                    document.getElementById('f-nom').innerText = alum.nom;
                    document.getElementById('f-id').innerText = txt;
                    document.getElementById('f-tut').innerText = alum.tut;
                    document.getElementById('f-ale').innerText = alum.ale;
                } else { alert("ID: " + txt + " no registrado."); }
            }).catch(e => alert("Error de cámara: Activa permisos en el candado de la barra de direcciones."));
        }

        function exportar() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
            const dlAnchorNode = document.createElement('a');
            dlAnchorNode.setAttribute("href", dataStr);
            dlAnchorNode.setAttribute("download", "respaldo_nayar.json");
            dlAnchorNode.click();
        }
    </script>
    <div class="fixed bottom-2 text-[10px] text-gray-300">Gestión Escolares Grupo A9</div>
</body>
</html>
