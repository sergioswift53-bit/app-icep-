<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Primaria El Nayar Durango - Lector QR</title>
    <!-- Librería estable 2.3.8 -->
    <script src="https://unpkg.com"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; padding-bottom: 100px; }
        #reader { border-radius: 20px; overflow: hidden; background: #000; border: 4px solid #16a34a; min-height: 280px; }
        .footer-a9 { position: fixed; bottom: 0; left: 0; width: 100%; background: #ffffff; padding: 15px; border-top: 1px solid #e2e8f0; text-align: center; z-index: 1000; }
    </style>
</head>
<body>

    <div class="max-w-md mx-auto p-6">
        <header class="text-center mb-6">
            <h1 class="text-3xl font-black text-green-900 leading-tight">PRIMARIA EL NAYAR<br>DURANGO</h1>
            <p class="text-gray-400 font-bold text-[10px] tracking-[0.3em] uppercase mt-2">Gestión de Alumnos</p>
        </header>

        <!-- BUSCADOR MANUAL -->
        <div class="bg-white p-4 rounded-2xl shadow-sm border mb-4">
            <div class="flex gap-2">
                <input type="text" id="manual-id" placeholder="ID (EJ: ALUM-001)" class="flex-1 bg-gray-50 border-none rounded-xl px-4 py-3 text-sm font-bold outline-none focus:ring-2 focus:ring-green-600 uppercase">
                <button onclick="buscarManual()" class="bg-gray-800 text-white px-5 py-3 rounded-xl text-xs font-black active:scale-95 transition-transform">VER</button>
            </div>
        </div>

        <!-- BOTÓN DE CÁMARA (OBLIGATORIO PARA PERMISOS) -->
        <button id="btn-scan" onclick="activarCamara()" class="w-full bg-green-700 text-white py-5 rounded-2xl shadow-xl font-black flex items-center justify-center gap-3 mb-4 active:scale-95 transition-all text-lg border-b-4 border-green-900">
            <span>📷</span> ACTIVAR CÁMARA
        </button>

        <!-- LECTOR -->
        <div id="reader-container" class="hidden mb-6">
            <div id="reader"></div>
            <button onclick="location.reload()" class="w-full mt-4 bg-white border-2 py-3 rounded-xl text-xs font-black text-red-500 uppercase">Cerrar Escáner</button>
        </div>

        <!-- SUBIR IMAGEN -->
        <div class="text-center mb-6">
            <label class="inline-block px-8 py-4 bg-white border-2 border-dashed border-gray-300 rounded-2xl cursor-pointer hover:border-green-600">
                <span class="text-[11px] font-black text-gray-500 uppercase tracking-widest">📁 SUBIR IMAGEN QR</span>
                <input type="file" id="qr-input-file" accept="image/*" class="hidden">
            </label>
        </div>

        <!-- FICHA DEL ALUMNO -->
        <div id="student-card" class="hidden bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-gray-100">
            <div class="bg-green-800 p-8 text-white text-center">
                <p class="text-[10px] font-bold opacity-60 mb-2 uppercase tracking-widest">Nayarense Registrado</p>
                <h2 class="text-2xl font-black" id="st-nombre"></h2>
            </div>
            
            <div class="p-8 space-y-6">
                <div class="flex justify-between border-b pb-4">
                    <span class="text-[10px] font-bold text-gray-400 uppercase">Grado</span>
                    <span id="st-grado" class="font-black text-gray-800"></span>
                </div>

                <div class="bg-red-50 p-5 rounded-2xl border-l-4 border-red-500 text-center">
                    <span class="text-red-500 font-bold text-[10px] uppercase block mb-1">Alergias / Médicos</span>
                    <p id="st-alergias" class="font-black text-red-700 text-sm"></p>
                </div>

                <div class="text-center">
                    <span class="text-[10px] font-bold text-gray-400 uppercase">Tutor:</span>
                    <p id="st-tutor" class="font-bold text-gray-800"></p>
                </div>

                <a id="st-tel" href="#" class="block text-center bg-green-600 text-white py-4 rounded-2xl font-black shadow-lg shadow-green-100 flex items-center justify-center gap-2">
                    <span>📞</span> LLAMAR AL TUTOR
                </a>

                <button onclick="location.reload()" class="w-full text-[10px] font-black text-gray-300 uppercase tracking-widest pt-4">Nueva Consulta</button>
            </div>
        </div>
    </div>

    <!-- MARCA DE AGUA LEGIBLE -->
    <footer class="footer-a9">
        <p class="text-[12px] font-black text-gray-400 tracking-[0.2em] uppercase">
            DESARROLLADO POR EL <span class="text-green-700">GRUPO A9</span>
        </p>
    </footer>

    <script>
        const estudiantes = {
            "ALUM-001": { nombre: "Juan Pérez García", grado: "3° A", alergias: "Alérgico a Penicilina", contacto: "5551234567", tutor: "María García" },
            "ALUM-002": { nombre: "Lucía Fernández", grado: "1° B", alergias: "Ninguna", contacto: "5559876543", tutor: "Roberto F." }
        };

        let html5QrCode;

        function mostrarFicha(id) {
            const alumno = estudiantes[id.toUpperCase().trim()];
            if (alumno) {
                if(html5QrCode) html5QrCode.stop().catch(() => {});
                document.getElementById('reader-container').classList.add('hidden');
                document.getElementById('btn-scan').classList.add('hidden');
                document.getElementById('student-card').classList.remove('hidden');
                
                document.getElementById('st-nombre').innerText = alumno.nombre;
                document.getElementById('st-grado').innerText = alumno.grado;
                document.getElementById('st-alergias').innerText = alumno.alergias;
                document.getElementById('st-tutor').innerText = alumno.tutor;
                document.getElementById('st-tel').href = "tel:" + alumno.contacto;
            } else {
                alert("ID: " + id + " no encontrado.");
            }
        }

        function buscarManual() {
            const val = document.getElementById('manual-id').value;
            if(val) mostrarFicha(val);
        }

        async function activarCamara() {
            document.getElementById('reader-container').classList.remove('hidden');
            html5QrCode = new Html5Qrcode("reader");
            
            // Intentar con configuración móvil forzada
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            
            html5QrCode.start({ facingMode: "environment" }, config, mostrarFicha)
            .catch(err => {
                alert("Error: Asegúrate de dar permiso a la cámara en el candado de la URL.");
                console.error(err);
            });
        }

        // Sistema de carga de imagen (Corregido)
        document.getElementById('qr-input-file').addEventListener('change', e => {
            const file = e.target.files[0];
            if (!file) return;
            const scanner = new Html5Qrcode("reader");
            scanner.scanFile(file, true)
                .then(decodedText => mostrarFicha(decodedText))
                .catch(err => alert("No se pudo leer el QR. Asegúrate que la foto sea clara."));
        });
    </script>
</body>
</html>
