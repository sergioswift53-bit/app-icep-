<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escuela Primaria El Nayar Durango</title>
    <script src="https://unpkg.com"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .watermark { position: fixed; bottom: 15px; width: 100%; text-align: center; color: rgba(30, 58, 138, 0.3); font-size: 11px; font-weight: bold; pointer-events: none; z-index: 50; letter-spacing: 1px; }
        #reader { border-radius: 15px; overflow: hidden; background: #000; min-height: 250px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; overflow-y: auto; padding: 15px; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen pb-24">

    <div class="max-w-md mx-auto p-4">
        <header class="text-center mb-6">
            <h1 class="text-2xl font-black text-blue-700 uppercase leading-tight">Escuela Primaria<br>El Nayar Durango</h1>
        </header>

        <!-- BUSCADOR -->
        <div class="mb-4 relative">
            <input type="text" id="input-busqueda" onkeyup="buscadorManual()" placeholder="🔍 Buscar por nombre o ID..." 
                class="w-full p-4 rounded-2xl border-2 border-white shadow-md focus:border-blue-500 outline-none transition-all">
            <div id="lista-busqueda" class="hidden absolute w-full bg-white mt-1 rounded-xl shadow-2xl z-50 border overflow-hidden"></div>
        </div>

        <!-- BOTONERA -->
        <div class="grid grid-cols-1 gap-3">
            <button id="btn-camara" onclick="iniciarEscanerSeguro()" class="w-full bg-blue-600 text-white py-4 rounded-2xl shadow-lg font-black flex items-center justify-center gap-2">
                📷 ABRIR LECTOR QR
            </button>
            
            <button onclick="abrirRegistro()" class="w-full bg-white text-blue-700 border-2 border-blue-600 py-4 rounded-2xl shadow-sm font-black">
                ➕ AGREGAR NUEVO ALUMNO
            </button>

            <button onclick="toggleModal('modal-config')" class="w-full bg-slate-200 text-slate-600 py-3 rounded-2xl font-bold text-sm">
                ⚙️ CONFIGURACIONES
            </button>
        </div>

        <div id="cont-lector" class="hidden mt-4 shadow-xl border-4 border-white rounded-2xl overflow-hidden relative">
            <div id="reader"></div>
            <button onclick="detenerEscaner()" class="absolute top-2 right-2 bg-red-600 text-white p-2 rounded-full text-xs font-bold z-50">CERRAR X</button>
        </div>

        <!-- FICHA RESULTADO -->
        <div id="ficha-alumno" class="hidden mt-6 bg-white rounded-3xl shadow-2xl overflow-hidden border-t-8 border-blue-600">
            <div class="w-full h-56 bg-slate-100 flex items-center justify-center overflow-hidden">
                <img id="img-alumno" class="w-full h-full object-cover hidden">
                <span id="sin-foto" class="text-slate-300 font-black text-5xl">👤</span>
            </div>
            <div class="p-6">
                <h2 id="res-nombre" class="text-2xl font-black text-slate-800"></h2>
                <p id="res-id" class="text-blue-600 font-mono font-bold mb-4"></p>
                <div class="space-y-3 border-t pt-4">
                    <p><strong>Tutor:</strong> <span id="res-tutor"></span></p>
                    <div class="p-3 bg-red-50 text-red-700 rounded-xl font-bold border border-red-100">
                        Alergias: <span id="res-alergias"></span>
                    </div>
                </div>
                <button onclick="location.reload()" class="w-full bg-slate-800 text-white py-4 rounded-2xl mt-6 font-black uppercase">Cerrar Ficha</button>
            </div>
        </div>
    </div>

    <!-- MODAL REGISTRO -->
    <div id="modal-registro" class="modal">
        <div class="bg-white rounded-3xl p-6 max-w-sm mx-auto shadow-2xl mt-10">
            <h3 class="text-xl font-black text-blue-700 mb-4 text-center uppercase tracking-tight border-b pb-2">Nuevo Registro</h3>
            <form id="form-alumno" class="space-y-4">
                <div class="bg-blue-50 p-4 rounded-2xl border-2 border-dashed border-blue-200 text-center">
                    <label class="cursor-pointer block">
                        <span class="text-xs font-bold text-blue-600 uppercase italic">📸 Seleccionar Foto o Tomar con Cámara</span>
                        <input type="file" id="reg-foto" accept="image/*" class="hidden">
                    </label>
                </div>
                <div>
                    <label class="text-[9px] font-bold text-slate-400 ml-2">ID ASIGNADO:</label>
                    <input type="text" id="reg-id" readonly class="w-full p-3 bg-slate-100 rounded-xl font-mono font-bold text-blue-600 border-none">
                </div>
                <input type="text" id="reg-nombre" placeholder="Nombre completo del alumno" class="w-full p-4 bg-slate-50 border rounded-xl outline-none focus:ring-2 ring-blue-400" required>
                <input type="text" id="reg-tutor" placeholder="Nombre del tutor responsable" class="w-full p-4 bg-slate-50 border rounded-xl outline-none focus:ring-2 ring-blue-400" required>
                <textarea id="reg-alergias" placeholder="Detalle de alergias o notas médicas..." class="w-full p-4 bg-slate-50 border rounded-xl outline-none focus:ring-2 ring-blue-400"></textarea>
                
                <div class="flex gap-2">
                    <button type="button" onclick="cerrarRegistro()" class="flex-1 font-bold text-slate-400 py-4">CANCELAR</button>
                    <button type="submit" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg">GUARDAR</button>
                </div>
            </form>
        </div>
    </div>

    <!-- MODAL CONFIG -->
    <div id="modal-config" class="modal">
        <div class="bg-white rounded-3xl p-6 max-w-sm mx-auto shadow-2xl mt-20 text-center">
            <h3 class="font-black mb-4 uppercase">Configuraciones</h3>
            <button onclick="localStorage.clear(); location.reload();" class="w-full bg-red-50 text-red-600 p-5 rounded-xl font-bold mb-4 border border-red-100">🗑️ BORRAR TODA LA BASE DE DATOS</button>
            <button onclick="toggleModal('modal-config')" class="w-full bg-slate-900 text-white p-4 rounded-xl font-bold">CERRAR VENTANA</button>
        </div>
    </div>

    <div class="watermark uppercase">Gestión Escolares Grupo A9</div>

    <script>
        let db = JSON.parse(localStorage.getItem('nayardb')) || {};
        let scanner = null;

        function toggleModal(id) {
            const m = document.getElementById(id);
            m.style.display = (m.style.display === 'block') ? 'none' : 'block';
        }

        // --- SISTEMA DE ESCANER SEGURO ---
        async function iniciarEscanerSeguro() {
            const cont = document.getElementById('cont-lector');
            cont.classList.remove('hidden');

            try {
                if (scanner) {
                    await scanner.stop();
                    scanner.clear();
                }
                scanner = new Html5Qrcode("reader");
                
                // Retraso de 1s para asegurar que el hardware de la cámara responda
                setTimeout(async () => {
                    await scanner.start(
                        { facingMode: "environment" }, 
                        { fps: 15, qrbox: { width: 250, height: 250 } },
                        (txt) => mostrarFicha(txt)
                    ).catch(e => alert("Error de permisos: Asegúrate de estar en HTTPS y permitir la cámara."));
                }, 1000);

            } catch (err) {
                alert("No se pudo iniciar el escáner: " + err);
            }
        }

        async function detenerEscaner() {
            if (scanner) {
                await scanner.stop();
                scanner.clear();
            }
            document.getElementById('cont-lector').classList.add('hidden');
        }

        // --- GESTIÓN DE REGISTRO ---
        function abrirRegistro() {
            const num = Object.keys(db).length + 1;
            document.getElementById('reg-id').value = "ALUM-" + num.toString().padStart(3, '0');
            document.getElementById('modal-registro').style.display = 'block';
        }

        function cerrarRegistro() {
            document.getElementById('modal-registro').style.display = 'none';
        }

        document.getElementById('form-alumno').onsubmit = function(e) {
            e.preventDefault();
            const id = document.getElementById('reg-id').value;
            const fileInput = document.getElementById('reg-foto');

            const guardarDatos = (base64Img) => {
                db[id] = {
                    nombre: document.getElementById('reg-nombre').value,
                    tutor: document.getElementById('reg-tutor').value,
                    alergias: document.getElementById('reg-alergias').value || "Ninguna",
                    foto: base64Img
                };
                localStorage.setItem('nayardb', JSON.stringify(db));
                alert("Alumno registrado correctamente.");
                location.reload();
            };

            if (fileInput.files && fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = (ev) => guardarDatos(ev.target.result);
                reader.readAsDataURL(fileInput.files[0]);
            } else {
                guardarDatos(null);
            }
        };

        // --- BUSCADOR MANUAL ---
        function buscadorManual() {
            const val = document.getElementById('input-busqueda').value.toUpperCase();
            const list = document.getElementById('lista-busqueda');
            list.innerHTML = '';
            
            if(val.length < 2) { list.classList.add('hidden'); return; }
            
            const coincidencias = Object.keys(db).filter(k => 
                k.includes(val) || db[k].nombre.toUpperCase().includes(val)
            );

            if(coincidencias.length > 0) {
                list.classList.remove('hidden');
                coincidencias.forEach(m => {
                    const d = document.createElement('div');
                    d.className = "p-4 border-b hover:bg-blue-50 cursor-pointer flex justify-between items-center";
                    d.innerHTML = <div><p class="font-bold text-slate-800">${db[m].nombre}</p><p class="text-[10px] text-blue-600">${m}</p></div><span>➜</span>;
                    d.onclick = () => {
                        mostrarFicha(m);
                        list.classList.add('hidden');
                        document.getElementById('input-busqueda').value = '';
                    };
                    list.appendChild(d);
                });
            } else {
                list.classList.add('hidden');
            }
        }

        function mostrarFicha(id) {
            const data = db[id.toUpperCase().trim()];
            if(!data) {
                alert("Este código no está registrado.");
                return;
            }
            
            detenerEscaner();
            document.getElementById('ficha-alumno').classList.remove('hidden');
            document.getElementById('res-nombre').innerText = data.nombre;
            document.getElementById('res-id').innerText = "ID: " + id;
            document.getElementById('res-tutor').innerText = data.tutor;
            document.getElementById('res-alergias').innerText = data.alergias;

            const visor = document.getElementById('img-alumno');
            const sinFoto = document.getElementById('sin-foto');
            if(data.foto) {
                visor.src = data.foto;
                visor.classList.remove('hidden');
                sinFoto.classList.add('hidden');
            } else {
                visor.classList.add('hidden');
                sinFoto.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
