<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escuela Primaria El Nayar Durango - Sistema</title>
    <script src="https://unpkg.com"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .watermark { position: fixed; bottom: 15px; width: 100%; text-align: center; color: rgba(0,0,0,0.3); font-size: 10px; font-weight: bold; pointer-events: none; z-index: 50; letter-spacing: 2px; }
        #reader { border-radius: 20px; overflow: hidden; background: #000; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; overflow-y: auto; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-20">

    <div class="max-w-md mx-auto p-5">
        <header class="flex justify-between items-center mb-6">
            <div>
                <!-- TÍTULO ACTUALIZADO -->
                <h1 class="text-2xl font-black text-green-800 leading-tight">ESCUELA PRIMARIA<br>EL NAYAR DURANGO</h1>
                <p class="text-gray-500 font-bold text-[10px] uppercase tracking-widest">Lector Inteligente</p>
            </div>
            <button onclick="toggleModal('modal-config')" class="bg-white p-3 rounded-full shadow-md text-xl">⚙️</button>
        </header>

        <div class="grid grid-cols-1 gap-3 mb-6">
            <!-- BOTÓN CON SOLICITUD DE PERMISOS ACTIVA -->
            <button onclick="activarCamaraSegura()" class="w-full bg-green-600 text-white py-4 rounded-2xl shadow-lg font-black flex items-center justify-center gap-2 active:scale-95 transition-all">
                📷 ESCANEAR QR (ACTIVAR CÁMARA)
            </button>
            <button onclick="prepararNuevoAlumno()" class="w-full bg-blue-600 text-white py-4 rounded-2xl shadow-lg font-black flex items-center justify-center gap-2 active:scale-95 transition-all">
                ➕ AGREGAR NUEVO ALUMNO
            </button>
        </div>

        <div id="reader-container" class="hidden mb-6"><div id="reader"></div></div>

        <!-- FICHA DEL ALUMNO -->
        <div id="student-card" class="hidden bg-white rounded-3xl shadow-2xl overflow-hidden border-t-8 border-green-600">
            <div id="st-foto-cont" class="w-full h-48 bg-gray-200 flex items-center justify-center overflow-hidden">
                <img id="st-foto" src="" class="w-full h-full object-cover hidden">
                <span id="st-sin-foto" class="text-gray-400 font-bold">SIN FOTO</span>
            </div>
            <div class="p-6">
                <h2 class="text-2xl font-black text-gray-800 mb-2" id="st-nombre"></h2>
                <p class="text-xs font-bold text-green-600 mb-4 tracking-widest" id="st-id-display"></p>
                <div class="space-y-3 text-sm">
                    <p><strong>Tutor:</strong> <span id="st-tutor"></span></p>
                    <div class="bg-red-50 p-3 rounded-xl text-red-700 font-bold">
                        ⚠️ Alergias: <span id="st-alergias"></span>
                    </div>
                    <a id="st-tel" href="#" class="block text-center bg-green-100 text-green-700 py-3 rounded-xl font-black underline italic">📞 LLAMAR AL TUTOR</a>
                </div>
                <button onclick="location.reload()" class="w-full bg-gray-800 text-white py-3 rounded-xl mt-6 font-bold uppercase tracking-tighter">Cerrar</button>
            </div>
        </div>
    </div>

    <!-- MODAL FORMULARIO REGISTRO -->
    <div id="modal-registro" class="modal p-5">
        <div class="bg-white rounded-3xl p-6 max-w-md mx-auto my-10 shadow-2xl">
            <h3 class="text-xl font-black text-blue-800 mb-4">NUEVO REGISTRO</h3>
            <form id="form-alumno" class="space-y-4">
                <div><label class="text-[10px] font-bold text-gray-400">ID ASIGNADO:</label>
                <input type="text" id="reg-id" readonly class="w-full bg-gray-100 p-2 rounded-lg font-mono font-bold text-blue-600"></div>
                
                <input type="text" id="reg-nombre" placeholder="Nombre completo del alumno" class="w-full p-3 border-2 rounded-xl focus:border-blue-500 outline-none" required>
                <input type="text" id="reg-tutor" placeholder="Nombre del tutor" class="w-full p-3 border-2 rounded-xl focus:border-blue-500 outline-none" required>
                <input type="tel" id="reg-tel" placeholder="Teléfono de emergencia" class="w-full p-3 border-2 rounded-xl focus:border-blue-500 outline-none" required>
                <textarea id="reg-alergias" placeholder="Alergias o condiciones médicas" class="w-full p-3 border-2 rounded-xl focus:border-blue-500 outline-none"></textarea>
                
                <div class="bg-gray-50 p-4 rounded-xl border-2 border-dashed">
                    <label class="block text-center text-xs font-bold text-gray-500 mb-2">FOTO DEL ALUMNO</label>
                    <input type="file" id="reg-foto" accept="image/*" class="w-full text-xs">
                </div>

                <div class="flex gap-2">
                    <button type="button" onclick="toggleModal('modal-registro')" class="flex-1 bg-gray-200 py-3 rounded-xl font-bold">CANCELAR</button>
                    <button type="submit" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold">GUARDAR</button>
                </div>
            </form>
        </div>
    </div>

    <!-- MODAL CONFIGURACIONES -->
    <div id="modal-config" class="modal p-5">
        <div class="bg-white rounded-3xl p-6 max-w-md mx-auto my-10">
            <h3 class="text-xl font-black mb-4">CONFIGURACIONES</h3>
            <p class="text-gray-500 italic mb-6">Próximamente más opciones aquí...</p>
            <button onclick="exportarDatos()" class="w-full bg-gray-100 p-3 rounded-xl text-sm font-bold mb-3">📥 EXPORTAR COPIA DE SEGURIDAD</button>
            <button onclick="toggleModal('modal-config')" class="w-full bg-red-500 text-white py-3 rounded-xl font-bold">VOLVER</button>
        </div>
    </div>

    <div class="watermark uppercase">SISTEMA DINÁMICO A9</div>

    <script>
        let db = JSON.parse(localStorage.getItem('alumnos_db')) || {};
        let html5QrCode;

        function toggleModal(id) {
            const m = document.getElementById(id);
            m.style.display = (m.style.display === 'block') ? 'none' : 'block';
        }

        function prepararNuevoAlumno() {
            const indices = Object.keys(db).map(k => parseInt(k.split('-')[1]));
            const max = indices.length > 0 ? Math.max(...indices) : 0;
            const nextID = "ALUM-" + (max + 1).toString().padStart(3, '0');
            document.getElementById('reg-id').value = nextID;
            toggleModal('modal-registro');
        }

        // FUNCIÓN MODIFICADA PARA FORZAR PERMISOS
        async function activarCamaraSegura() {
            const container = document.getElementById('reader-container');
            container.classList.remove('hidden');

            // Si ya existe una instancia, la limpiamos para forzar reinicio de permisos
            if (html5QrCode) {
                try {
                    await html5QrCode.stop();
                    html5QrCode.clear();
                } catch (e) { /* Silencioso si no estaba corriendo */ }
            }

            html5QrCode = new Html5Qrcode("reader");
            
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };

            // Start dispara la solicitud de permiso del navegador
            html5QrCode.start({ facingMode: "environment" }, config, mostrarFicha)
            .catch(err => {
                console.error(err);
                alert("Para escanear, debes permitir el acceso a la cámara en la configuración de tu navegador.");
            });
        }

        function mostrarFicha(id) {
            const alumno = db[id.toUpperCase().trim()];
            if (alumno) {
                if(html5QrCode) html5QrCode.stop().catch(() => {});
                document.getElementById('reader-container').classList.add('hidden');
                document.getElementById('student-card').classList.remove('hidden');
                
                document.getElementById('st-nombre').innerText = alumno.nombre;
                document.getElementById('st-id-display').innerText = "ID: " + id;
                document.getElementById('st-tutor').innerText = alumno.tutor;
                document.getElementById('st-alergias').innerText = alumno.alergias;
                document.getElementById('st-tel').href = "tel:" + alumno.contacto;

                if(alumno.foto) {
                    document.getElementById('st-foto').src = alumno.foto;
                    document.getElementById('st-foto').classList.remove('hidden');
                    document.getElementById('st-sin-foto').classList.add('hidden');
                }
            } else {
                alert("El código " + id + " no está registrado.");
            }
        }

        document.getElementById('form-alumno').onsubmit = function(e) {
            e.preventDefault();
            const id = document.getElementById('reg-id').value;
            const fotoInput = document.getElementById('reg-foto');
            
            const guardar = (fotoBase64) => {
                db[id] = {
                    nombre: document.getElementById('reg-nombre').value,
                    tutor: document.getElementById('reg-tutor').value,
                    contacto: document.getElementById('reg-tel').value,
                    alergias: document.getElementById('reg-alergias').value || "Ninguna",
                    foto: fotoBase64 || null
                };
                localStorage.setItem('alumnos_db', JSON.stringify(db));
                alert("Alumno " + id + " guardado con éxito.");
                location.reload();
            };

            if (fotoInput.files && fotoInput.files[0]) {
                const reader = new FileReader();
                reader.onload = (ev) => guardar(ev.target.result);
                reader.readAsDataURL(fotoInput.files[0]);
            } else {
                guardar(null);
            }
        };

        function exportarDatos() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "respaldo_el_nayar.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }
    </script>
</body>
</html>
