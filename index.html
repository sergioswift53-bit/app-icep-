<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Primaria El Nayar - Lector QR</title>
    <script src="https://unpkg.com"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; }
        #reader { border-radius: 24px; overflow: hidden; background: #000; border: 4px solid #059669; }
        /* Barra de marca de agua separada */
        .footer-a9 { position: fixed; bottom: 0; left: 0; width: 100%; background: white; padding: 10px; border-t: 1px solid #e5e7eb; text-align: center; z-index: 100; }
        .slide-in { animation: slideIn 0.5s ease-out; }
        @keyframes slideIn { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="min-h-screen pb-20">

    <div class="max-w-md mx-auto p-6">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-black text-green-800">EL NAYAR</h1>
            <p class="text-gray-500 font-bold text-xs uppercase tracking-[0.3em]">Durango, Dgo.</p>
        </header>

        <!-- CONTENEDOR DEL ESCÁNER (ARRANCA SOLO) -->
        <div id="reader-container" class="mb-6">
            <div id="reader"></div>
            <div class="flex justify-between mt-4 px-2">
                <label class="bg-white px-4 py-2 rounded-xl text-[10px] font-black text-gray-500 border shadow-sm cursor-pointer uppercase">
                    📁 Subir Imagen QR
                    <input type="file" id="qr-input-file" accept="image/*" class="hidden">
                </label>
                <button onclick="location.reload()" class="bg-white px-4 py-2 rounded-xl text-[10px] font-black text-green-700 border shadow-sm uppercase">
                    🔄 Reiniciar Cámara
                </button>
            </div>
        </div>

        <!-- FICHA DEL ALUMNO (ESTILO CREDENCIAL) -->
        <div id="student-card" class="hidden slide-in bg-white rounded-[2rem] shadow-2xl overflow-hidden border border-gray-200">
            <div class="bg-green-700 p-8 text-white text-center">
                <p class="text-[10px] font-bold opacity-70 mb-2 uppercase tracking-widest">Información del Alumno</p>
                <h2 class="text-2xl font-black leading-tight" id="st-nombre"></h2>
            </div>
            
            <div class="p-8 space-y-6">
                <div class="flex justify-between items-center pb-4 border-b">
                    <span class="text-[10px] font-bold text-gray-400 uppercase">Grado</span>
                    <span id="st-grado" class="font-black text-gray-800 text-lg"></span>
                </div>

                <div class="bg-red-50 p-5 rounded-2xl border-l-4 border-red-500">
                    <span class="text-red-500 font-bold text-[10px] uppercase block mb-1">Alergias / Médicos</span>
                    <p id="st-alergias" class="font-black text-red-700"></p>
                </div>

                <div class="space-y-1">
                    <span class="text-[10px] font-bold text-gray-400 uppercase">Tutor Responsable</span>
                    <p id="st-tutor" class="font-bold text-gray-800"></p>
                </div>

                <a id="st-tel" href="#" class="block text-center bg-green-600 text-white py-4 rounded-2xl font-black shadow-lg shadow-green-200 active:scale-95 transition-transform">
                    📞 LLAMAR TUTOR
                </a>

                <button onclick="location.reload()" class="w-full text-[10px] font-black text-gray-400 uppercase tracking-widest pt-4">
                    Volver a escanear
                </button>
            </div>
        </div>
    </div>

    <!-- MARCA DE AGUA INDEPENDIENTE -->
    <footer class="footer-a9 shadow-inner">
        <p class="text-[10px] font-black text-gray-400 tracking-[0.2em] uppercase">
            Desarrollado por el <span class="text-green-600">Grupo A9</span>
        </p>
    </footer>

    <script>
        const estudiantes = {
            "ALUM-001": { nombre: "Juan Pérez García", grado: "3° A - Primaria", alergias: "Diabetes / Alérgico a Penicilina", contacto: "5551234567", tutor: "María García" },
            "ALUM-002": { nombre: "Lucía Fernández", grado: "1° B - Primaria", alergias: "Ninguna", contacto: "5559876543", tutor: "Roberto F." }
        };

        let html5QrCode;

        function mostrarFicha(id) {
            const alumno = estudiantes[id.toUpperCase().trim()];
            if (alumno) {
                if(html5QrCode) {
                    html5QrCode.stop().then(() => {
                        document.getElementById('reader-container').classList.add('hidden');
                        document.getElementById('student-card').classList.remove('hidden');
                    }).catch(() => {
                        document.getElementById('reader-container').classList.add('hidden');
                        document.getElementById('student-card').classList.remove('hidden');
                    });
                }
                
                document.getElementById('st-nombre').innerText = alumno.nombre;
                document.getElementById('st-grado').innerText = alumno.grado;
                document.getElementById('st-alergias').innerText = alumno.alergias;
                document.getElementById('st-tutor').innerText = alumno.tutor;
                document.getElementById('st-tel').href = "tel:" + alumno.contacto;
            } else {
                alert("ID: " + id + " no está en la base de datos.");
            }
        }

        // ARRANQUE AUTOMÁTICO AL CARGAR
        window.onload = () => {
            html5QrCode = new Html5Qrcode("reader");
            setTimeout(() => {
                html5QrCode.start(
                    { facingMode: "environment" }, 
                    { fps: 15, qrbox: 250 },
                    mostrarFicha
                ).catch(err => {
                    console.log("Esperando interacción o permisos...");
                });
            }, 800);
        };

        // Procesar archivo si la cámara falla
        document.getElementById('qr-input-file').addEventListener('change', e => {
            const file = e.target.files[0];
            if (!file) return;
            const qrScanner = new Html5Qrcode("reader");
            qrScanner.scanFile(file, true)
                .then(decodedText => mostrarFicha(decodedText))
                .catch(err => alert("No se detectó el código. Intenta con una foto más clara."));
        });
    </script>
</body>
</html>
