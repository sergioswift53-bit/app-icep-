<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Primaria El Nayar - Lector QR</title>
    <script src="https://unpkg.com"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; }
        #reader { border-radius: 24px; overflow: hidden; background: #000; border: 4px solid #059669; }
        .footer-a9 { position: fixed; bottom: 0; left: 0; width: 100%; background: white; padding: 10px; border-top: 1px solid #e5e7eb; text-align: center; z-index: 100; }
        .slide-in { animation: slideIn 0.5s ease-out; }
        @keyframes slideIn { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="min-h-screen pb-24">

    <div class="max-w-md mx-auto p-6">
        <header class="text-center mb-6">
            <h1 class="text-3xl font-black text-green-800 uppercase">EL NAYAR</h1>
            <p class="text-gray-400 font-bold text-[10px] tracking-[0.3em] uppercase">Durango, Dgo.</p>
        </header>

        <!-- PANEL DE BÚSQUEDA MANUAL -->
        <div class="bg-white p-3 rounded-2xl shadow-sm border mb-4">
            <div class="flex gap-2">
                <input type="text" id="manual-id" placeholder="ID del Alumno (Ej: ALUM-001)" class="flex-1 border-none bg-gray-50 rounded-xl px-4 py-2 text-sm outline-none focus:ring-2 focus:ring-green-500 uppercase font-bold text-gray-700">
                <button onclick="buscarManual()" class="bg-green-700 text-white px-5 py-2 rounded-xl text-xs font-black shadow-md active:scale-95 transition-transform">BUSCAR</button>
            </div>
        </div>

        <!-- CONTENEDOR DEL ESCÁNER -->
        <div id="reader-container" class="mb-6">
            <div id="reader"></div>
            <div class="flex justify-between mt-4 px-1">
                <label class="bg-white px-4 py-3 rounded-xl text-[9px] font-black text-gray-400 border shadow-sm cursor-pointer uppercase flex items-center gap-2">
                    <span>📁</span> Subir Imagen
                    <input type="file" id="qr-input-file" accept="image/*" class="hidden">
                </label>
                <button onclick="location.reload()" class="bg-white px-4 py-3 rounded-xl text-[9px] font-black text-green-700 border shadow-sm uppercase flex items-center gap-2">
                    <span>🔄</span> Reiniciar Cámara
                </button>
            </div>
        </div>

        <!-- FICHA DEL ALUMNO -->
        <div id="student-card" class="hidden slide-in bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-gray-100">
            <div class="bg-green-700 p-8 text-white text-center">
                <p class="text-[9px] font-bold opacity-60 mb-2 uppercase tracking-[0.2em]">Registro Escolar Nayar</p>
                <h2 class="text-2xl font-black leading-tight" id="st-nombre"></h2>
            </div>
            
            <div class="p-8 space-y-5">
                <div class="flex justify-between items-center pb-3 border-b border-gray-50">
                    <span class="text-[10px] font-bold text-gray-300 uppercase">Grado Actual</span>
                    <span id="st-grado" class="font-black text-gray-800 text-base"></span>
                </div>

                <div class="bg-red-50 p-5 rounded-2xl border-l-4 border-red-500 shadow-sm shadow-red-100">
                    <span class="text-red-400 font-bold text-[9px] uppercase block mb-1">Alergias y Observaciones</span>
                    <p id="st-alergias" class="font-black text-red-700 text-sm"></p>
                </div>

                <div class="space-y-1">
                    <span class="text-[10px] font-bold text-gray-300 uppercase">Tutor / Responsable</span>
                    <p id="st-tutor" class="font-bold text-gray-700"></p>
                </div>

                <a id="st-tel" href="#" class="block text-center bg-green-600 text-white py-4 rounded-2xl font-black shadow-lg shadow-green-100 active:scale-95 transition-transform flex items-center justify-center gap-2">
                    <span>📞</span> LLAMAR AL TUTOR
                </a>

                <button onclick="location.reload()" class="w-full text-[9px] font-black text-gray-400 uppercase tracking-widest pt-4 opacity-50">
                    ← Volver a Escanear
                </button>
            </div>
        </div>
    </div>

    <!-- MARCA DE AGUA INDEPENDIENTE -->
    <footer class="footer-a9">
        <p class="text-[10px] font-black text-gray-300 tracking-[0.2em] uppercase">
            Desarrollado por el <span class="text-green-600 opacity-60">Grupo A9</span>
        </p>
    </footer>

    <script>
        // BASE DE DATOS LOCAL
        const estudiantes = {
            "ALUM-001": { nombre: "Juan Pérez García", grado: "3° A - Primaria", alergias: "Alérgico a Penicilina", contacto: "5551234567", tutor: "María García" },
            "ALUM-002": { nombre: "Lucía Fernández", grado: "1° B - Primaria", alergias: "Ninguna", contacto: "5559876543", tutor: "Roberto F." }
        };

        let html5QrCode;

        function mostrarFicha(id) {
            const alumno = estudiantes[id.toUpperCase().trim()];
            if (alumno) {
                if(html5QrCode) {
                    html5QrCode.stop().catch(() => {}).finally(() => {
                        document.getElementById('reader-container').classList.add('hidden');
                        document.getElementById('student-card').classList.remove('hidden');
                    });
                } else {
                    document.getElementById('reader-container').classList.add('hidden');
                    document.getElementById('student-card').classList.remove('hidden');
                }
                
                document.getElementById('st-nombre').innerText = alumno.nombre;
                document.getElementById('st-grado').innerText = alumno.grado;
                document.getElementById('st-alergias').innerText = alumno.alergias;
                document.getElementById('st-tutor').innerText = alumno.tutor;
                document.getElementById('st-tel').href = "tel:" + alumno.contacto;
            } else {
                alert("ID: " + id + " no encontrado en la base de datos El Nayar.");
            }
        }

        function buscarManual() {
            const input = document.getElementById('manual-id');
            if(input.value) mostrarFicha(input.value);
        }

        // ARRANQUE AUTOMÁTICO
        window.onload = () => {
            html5QrCode = new Html5Qrcode("reader");
            setTimeout(() => {
                html5QrCode.start(
                    { facingMode: "environment" }, 
                    { fps: 15, qrbox: 250 },
                    mostrarFicha
                ).catch(err => console.log("Permisos pendientes..."));
            }, 800);
        };

        // SUBIR ARCHIVO
        document.getElementById('qr-input-file').addEventListener('change', e => {
            if (e.target.files.length === 0) return;
            const file = e.target.files;
            const qrScanner = new Html5Qrcode("reader");
            qrScanner.scanFile(file, true)
                .then(decodedText => mostrarFicha(decodedText))
                .catch(err => alert("Error: No se detectó el código en la imagen."));
        });
    </script>
</body>
</html>
