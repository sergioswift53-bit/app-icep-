<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba de Cámara - El Nayar</title>
    <!-- Librería de lectura QR -->
    <script src="https://unpkg.com"></script>
    <!-- Estilo rápido -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center justify-center p-6">

    <h1 class="text-xl font-bold mb-8 text-blue-400">PRUEBA DE CÁMARA QR</h1>

    <!-- El botón principal -->
    <button onclick="encenderCamara()" class="w-full max-w-xs bg-blue-600 hover:bg-blue-500 py-6 rounded-2xl font-black text-xl shadow-2xl transition-all active:scale-95">
        📷 ABRIR CÁMARA
    </button>

    <!-- Contenedor donde se verá el video -->
    <div id="lector" class="w-full max-w-sm mt-8 rounded-3xl overflow-hidden border-4 border-blue-500 hidden"></div>

    <p id="status" class="mt-4 text-slate-400 text-sm italic text-center">
        Pulsa el botón para solicitar permisos
    </p>

    <script>
        let html5QrCode;

        async function encenderCamara() {
            const status = document.getElementById('status');
            const contenedor = document.getElementById('lector');
            
            status.innerText = "Solicitando permisos...";
            contenedor.classList.remove('hidden');

            // Instanciamos el lector
            html5QrCode = new Html5Qrcode("lector");

            const configuracion = { 
                fps: 10, 
                qrbox: { width: 250, height: 250 } 
            };

            // Intentamos arrancar la cámara trasera
            html5QrCode.start(
                { facingMode: "environment" }, 
                configuracion,
                (codigoTexto) => {
                    // Si lee algo, lanzamos un aviso
                    alert("¡Lectura exitosa!: " + codigoTexto);
                }
            ).catch(err => {
                status.innerText = "Error: " + err;
                console.error(err);
                alert("No se pudo abrir la cámara. Revisa que estés en HTTPS y hayas dado permiso.");
            });
        }
    </script>
</body>
</html>
