<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cámara Integrada - El Nayar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- LIBRERÍA INYECTADA DIRECTAMENTE PARA EVITAR ERRORES DE CARGA -->
    <script src="https://raw.githack.com"></script>
</head>
<body class="bg-slate-900 text-white p-6 min-h-screen flex flex-col items-center">

    <h1 class="text-xl font-black mb-4 text-blue-400 uppercase text-center">Sistema de Cámara<br>Primaria El Nayar</h1>
    
    <div id="consola" class="text-[10px] bg-black p-4 rounded-lg w-full mb-4 font-mono text-green-500 h-32 overflow-y-auto border border-slate-700">
        > Iniciando sistema local...<br>
        > Verificando componentes internos...
    </div>

    <button id="btn-activar" onclick="iniciarSistema()" class="w-full bg-blue-600 hover:bg-blue-500 p-6 rounded-2xl font-black text-xl mb-4 shadow-lg active:scale-95 transition-all">
        🚀 ACTIVAR CÁMARA
    </button>

    <div id="reader" class="w-full max-w-sm rounded-2xl overflow-hidden border-2 border-slate-700 bg-black"></div>

    <script>
        const consola = document.getElementById('consola');
        function log(m) { 
            consola.innerHTML += `<br>> ${m}`; 
            consola.scrollTop = consola.scrollHeight; 
        }

        async function iniciarSistema() {
            // Intento de detección de la librería
            if (typeof Html5Qrcode === 'undefined') {
                log("FALLO CRÍTICO: La librería sigue sin responder.");
                alert("Error de carga. Intenta recargar la página con el botón del navegador.");
                return;
            }

            log("Librería cargada con éxito ✅");
            
            try {
                log("Solicitando permisos de video...");
                const html5QrCode = new Html5Qrcode("reader");
                
                const config = { 
                    fps: 15, 
                    qrbox: { width: 250, height: 250 }
                };

                log("Encendiendo lente trasero...");
                await html5QrCode.start(
                    { facingMode: "environment" }, 
                    config,
                    (codigo) => {
                        log("¡QR DETECTADO!");
                        alert("Código leído: " + codigo);
                    }
                );

                log("CÁMARA EN VIVO 🟢");
                document.getElementById('btn-activar').style.display = 'none';

            } catch (err) {
                log("ERROR: " + err);
                if(err.includes("HTTPS")) {
                    alert("IMPORTANTE: GitHub requiere conexión segura (HTTPS).");
                } else {
                    alert("Por favor, permite el acceso a la cámara en la ventana que aparecerá.");
                }
            }
        }
    </script>
</body>
</html>
